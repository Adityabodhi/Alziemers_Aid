name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libsqlite3-dev libtool libltdl-dev m4 autoconf automake \
            libncurses5-dev libffi-dev libssl-dev pkg-config zip unzip

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0" buildozer setuptools
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        id: build_apk
        continue-on-error: true
        run: |
          cd AlzheimersAid
          # Run buildozer and capture logs
          buildozer -v android debug > build.log 2>&1

      - name: Commit build log on failure
        if: steps.build_apk.outcome == 'failure'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add AlzheimersAid/build.log || true
          git commit -m "Upload build log for remote debugging" || true
          git push origin HEAD:${GITHUB_REF} || true
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: AlzheimersAid/bin/*.apk
